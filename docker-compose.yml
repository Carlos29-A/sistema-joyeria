services:
  postgres:
    image: postgres:17-alpine
    container_name: joyeria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-joyeria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-joyeria123}
      POSTGRES_DB: ${POSTGRES_DB:-joyeria_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
